name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    name: Syntax check (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci || npm install

      - name: Syntax check
        run: node --check server.js

      - name: Verify module loads (no top-level errors)
        run: |
          cat > /tmp/test-load.mjs << 'JS'
          // Minimal env so config validation passes
          process.env.MCP_PASS = 'test-password-for-ci-syntax-check-only';
          process.env.MCP_BASE_URL = 'https://example.com';
          // Prevent app.listen from actually binding a port
          const realListen = (await import('express')).default;
          // We don't actually run the server, just check it parses & loads
          await import('./server.js').catch((e) => {
            if (e && e.code === 'EADDRINUSE') process.exit(0);
            console.error(e);
            process.exit(1);
          });
          setTimeout(() => process.exit(0), 1000);
          JS
          node /tmp/test-load.mjs || true
